<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Simple globe with iTowns</title>
    <link rel="stylesheet" href="./style.css">
    <script type="importmap">
        {
          "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
          }
        }
    </script>
</head>
<body>
    <div id="container">
        <div id="viewerDiv"></div>
        <svg id="lines"></svg>
        <div id="labels"></div>
        <div id="timeline">
            <div id="ticks"></div>
<!--            <div id="ownerYearDots"></div>-->
            <div id="ownerYearRanges"></div>
            <input id="yearSlider" type="range" min="1920" max="1960" value="1935">
            <span id="selectedYear">1935</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/itowns@2.43.0/dist/itowns.js"></script>
    <script src="./node_modules/itowns/dist/itowns.js"></script>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
